<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📜 Transaction History - PlantUSDT</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .network-tag {
            display: inline-block;
            background: rgba(130, 71, 229, 0.15);
            color: #8247E5;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 500;
            margin-left: 4px;
        }
        .history-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.06);
        }
        .history-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .history-type {
            font-size: 14px;
            font-weight: 600;
        }
        .history-type.deposit { color: #00ff87; }
        .history-type.withdraw { color: #ff6b6b; }
        .history-type.earnings { color: #ffd93d; }
        .history-type.investment { color: #a29bfe; }
        .history-type.referral_earnings { color: #6c5ce7; }
        .history-date {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        .history-right {
            text-align: right;
        }
        .history-amount {
            font-size: 16px;
            font-weight: 700;
        }
        .history-amount.positive { color: #00ff87; }
        .history-amount.negative { color: #ff6b6b; }
        .history-status {
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 2px;
        }
        .history-status.completed {
            background: rgba(0,255,135,0.1);
            color: #00ff87;
        }
        .history-status.pending {
            background: rgba(255,213,0,0.1);
            color: #ffd93d;
        }
        .history-status.failed {
            background: rgba(255,107,107,0.1);
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <h1>📜 Transaction History</h1>
            <span style="font-size: 11px; color: #8247E5; background: rgba(130,71,229,0.1); padding: 2px 10px; border-radius: 12px;">Polygon</span>
        </div>

        <div class="history-filters">
            <button class="filter-btn active" onclick="filterHistory('all')">All</button>
            <button class="filter-btn" onclick="filterHistory('deposits')">Deposits</button>
            <button class="filter-btn" onclick="filterHistory('withdrawals')">Withdrawals</button>
            <button class="filter-btn" onclick="filterHistory('earnings')">Earnings</button>
            <button class="filter-btn" onclick="filterHistory('investments')">Investments</button>
        </div>

        <div id="historyList">
            <p class="empty-state">No transactions found.</p>
        </div>

        <button class="action-btn secondary" onclick="navigateTo('dashboard')" style="width: 100%; margin-top: 16px; border-color: rgba(0,255,135,0.2); color: #00ff87; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 4px;">
            📊 Back to Dashboard
        </button>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Override the renderHistory function to include Polygon network tag
        const originalRenderHistory = window.renderHistory || function() {};
        
        // Enhanced render function with network tag
        window.renderHistory = function(transactions) {
            const list = document.getElementById('historyList');
            if (!transactions || transactions.length === 0) {
                list.innerHTML = '<p class="empty-state">No transactions found.</p>';
                return;
            }

            let html = '';
            transactions.forEach(tx => {
                const typeClass = tx.type;
                const amountClass = (tx.type === 'deposit' || tx.type === 'earnings' || tx.type === 'referral_earnings') ? 'positive' : 'negative';
                const statusClass = tx.status || 'completed';
                const networkTag = '<span class="network-tag">🟣 Polygon</span>';
                
                let typeLabel = tx.type;
                if (tx.type === 'deposit') typeLabel = '💰 Deposit';
                else if (tx.type === 'withdraw') typeLabel = '🏦 Withdrawal';
                else if (tx.type === 'earnings') typeLabel = '📈 Earnings';
                else if (tx.type === 'referral_earnings') typeLabel = '👥 Referral Bonus';
                else if (tx.type === 'investment') typeLabel = '🌱 Investment';

                html += `
                    <div class="history-item">
                        <div class="history-left">
                            <div class="history-type ${typeClass}">
                                ${typeLabel} ${networkTag}
                            </div>
                            <div class="history-date">${tx.date || 'N/A'}</div>
                        </div>
                        <div class="history-right">
                            <div class="history-amount ${amountClass}">
                                ${tx.type === 'withdraw' ? '-' : '+'}$${tx.amount.toFixed(2)}
                            </div>
                            <div class="history-status ${statusClass}">
                                ${statusClass.toUpperCase()}
                            </div>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html;
        };

        // Override filter function to use enhanced render
        const originalFilterHistory = window.filterHistory || function() {};
        window.filterHistory = function(filter) {
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.filter-btn[onclick*="'${filter}'"]`)?.classList.add('active');

            // Get all transactions and filter
            const allTransactions = window.allTransactions || [];
            let filtered = allTransactions;
            
            if (filter !== 'all') {
                filtered = allTransactions.filter(tx => tx.type === filter);
            }

            window.renderHistory(filtered);
        };

        // Load history on page load
        document.addEventListener('DOMContentLoaded', function() {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const user = tg.initDataUnsafe?.user;
            const userId = user?.id || '0';

            fetch(`https://plantusdt.ddns.net/api/real_history?telegram_id=${userId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.transactions) {
                        window.allTransactions = data.transactions;
                        window.renderHistory(data.transactions);
                    } else {
                        document.getElementById('historyList').innerHTML = '<p class="empty-state">No transactions found.</p>';
                    }
                })
                .catch(error => {
                    console.error('Error loading history:', error);
                    document.getElementById('historyList').innerHTML = '<p class="empty-state">Error loading transactions.</p>';
                });
        });
    </script>
</body>
</html>
