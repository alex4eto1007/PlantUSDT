<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📜 History - PlantUSDT</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <h1>📜 Transaction History</h1>
        </div>

        <div class="history-filters">
            <button class="filter-btn active" onclick="filterHistory('all')">All</button>
            <button class="filter-btn" onclick="filterHistory('deposits')">Deposits</button>
            <button class="filter-btn" onclick="filterHistory('withdrawals')">Withdrawals</button>
            <button class="filter-btn" onclick="filterHistory('earnings')">Earnings</button>
        </div>

        <div id="historyList">
            <p class="empty-state">No transactions yet.</p>
        </div>

        <button class="action-btn secondary" onclick="navigateTo('dashboard')">📊 Back to Dashboard</button>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
