<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📜 Transaction History - PlantUSDT</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <h1>📜 Transaction History</h1>
        </div>

        <!-- Debug Button -->
        <button onclick="document.getElementById('debugDates').style.display='block'" style="background: rgba(255,0,0,0.1); border: 1px solid #ff6b6b; border-radius: 4px; padding: 4px 8px; color: #ff6b6b; font-size: 10px; cursor: pointer; margin-bottom: 8px; width: 100%;">🐛 Show Date Debug</button>

        <!-- Debug Info -->
        <div id="debugDates" style="background: #1a1a2e; padding: 10px; margin: 10px 0; border-radius: 8px; font-size: 12px; color: #00ff87; display: none; word-break: break-all; border: 1px solid rgba(0,255,135,0.2);"></div>

        <div class="history-filters">
            <button class="filter-btn active" onclick="filterHistory('all')">All</button>
            <button class="filter-btn" onclick="filterHistory('deposits')">Deposits</button>
            <button class="filter-btn" onclick="filterHistory('withdrawals')">Withdrawals</button>
            <button class="filter-btn" onclick="filterHistory('earnings')">Earnings</button>
            <button class="filter-btn" onclick="filterHistory('investments')">Investments</button>
        </div>

        <div id="historyList">
            <p class="empty-state">No transactions found.</p>
        </div>

        <button class="action-btn secondary" onclick="navigateTo('dashboard')" style="width: 100%; margin-top: 16px; border-color: rgba(0,255,135,0.2); color: #00ff87; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 4px;">
            📊 Back to Dashboard
        </button>
    </div>

    <script src="js/app.js?v=16"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.Telegram && window.Telegram.WebApp) {
                window.tg = window.Telegram.WebApp;
                window.tg.ready();
                window.tg.expand();
            }
            
            // Get user ID from Telegram
            const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
            const userId = tgUser?.id || '0';
            
            // Load history when page loads
            if (typeof filterHistory === 'function') {
                // Override filterHistory to add debug
                const originalFilter = filterHistory;
                filterHistory = function(type) {
                    // Call original filter first
                    originalFilter(type);
                    
                    // Add debug after a delay
                    setTimeout(function() {
                        const historyList = document.getElementById('historyList');
                        const debugEl = document.getElementById('debugDates');
                        if (debugEl && historyList) {
                            const items = historyList.querySelectorAll('.history-item');
                            if (items.length > 0) {
                                debugEl.innerHTML = '📅 Dates found: ' + items.length + ' transactions<br>';
                                items.forEach(function(item) {
                                    const dateEl = item.querySelector('.history-date');
                                    if (dateEl) {
                                        debugEl.innerHTML += '📆 ' + dateEl.textContent + '<br>';
                                    }
                                });
                                debugEl.style.display = 'block';
                            }
                        }
                    }, 1000);
                };
                
                // Load initial data
                filterHistory('all');
            }
        });
    </script>
</body>
</html>
