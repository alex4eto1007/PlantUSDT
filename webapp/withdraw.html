<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏦 Withdraw - PlantUSDT</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <h1>🏦 Withdraw</h1>
        </div>

        <div class="withdraw-info">
            <div class="info-card">
                <h3>💰 Available Balance</h3>
                <div class="balance-display" id="withdrawBalance">$0.00</div>
                <p>💵 Minimum: $2 USDT</p>
                <p>🔒 Fee: 10%</p>
            </div>

            <div class="info-card">
                <h3>📝 Withdrawal Form</h3>
                <form id="withdrawForm">
                    <div class="form-group">
                        <label>Amount (USDT)</label>
                        <input type="number" id="withdrawAmount" min="2" step="0.01" placeholder="Enter amount">
                    </div>
                    <div class="form-group">
                        <label>Your Wallet Address</label>
                        <input type="text" id="withdrawAddress" placeholder="0x..." readonly>
                        <button class="action-btn info" onclick="setWallet()">Set Wallet</button>
                    </div>
                    <button type="submit" class="action-btn warning" id="withdrawBtn">🏦 Request Withdrawal</button>
                </form>
            </div>

            <div class="info-card">
                <h3>⚠️ Important</h3>
                <p>• Withdrawals are processed manually</p>
                <p>• Processing time: 12-24 hours</p>
                <p>• Make sure your wallet address is correct!</p>
            </div>
        </div>

        <button class="action-btn secondary" onclick="navigateTo('dashboard')">📊 Back to Dashboard</button>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
