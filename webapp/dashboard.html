<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Dashboard - PlantUSDT</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .stat-value { font-size: 20px; }
        .loading-text { color: #8892b0; font-size: 14px; text-align: center; padding: 20px; }
        .error-text { color: #ff6b6b; font-size: 14px; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.history.back()">←</button>
            <h1 style="color: #00ff87; font-size: 20px;">📊 Dashboard</h1>
        </div>

        <div id="loadingMessage" class="loading-text">Loading your data...</div>

        <div id="dashboardStats" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-label">Balance</div>
                    <div class="stat-value" id="dashBalance">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🌱</div>
                    <div class="stat-label">Invested</div>
                    <div class="stat-value" id="dashInvested">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-label">Earned</div>
                    <div class="stat-value" id="dashEarned">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💳</div>
                    <div class="stat-label">Deposited</div>
                    <div class="stat-value" id="dashDeposited">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-label">Referrals</div>
                    <div class="stat-value" id="dashReferrals">0</div>
                </div>
            </div>

            <div class="actions-grid" style="grid-template-columns: repeat(1, 1fr);">
                <button class="action-btn" onclick="window.location.href='history.html'" style="background: linear-gradient(135deg, #a29bfe, #6c5ce7) !important; color: #ffffff !important; border: none; padding: 16px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%;">
                    <span class="btn-icon">📜</span>
                    Transaction History
                </button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const userId = user?.id || '0';

        console.log('Dashboard loaded, userId:', userId);

        document.getElementById('loadingMessage').textContent = '📡 Fetching data for user: ' + userId;

        fetch(`https://plantusdt.ddns.net/api/user?telegram_id=${userId}`)
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('API Response:', data);
                
                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('dashboardStats').style.display = 'block';

                if (data.success) {
                    document.getElementById('dashBalance').textContent = '$' + (data.balance || 0).toFixed(2);
                    document.getElementById('dashInvested').textContent = '$' + (data.total_invested || 0).toFixed(2);
                    document.getElementById('dashEarned').textContent = '$' + (data.total_earnings || 0).toFixed(2);
                    document.getElementById('dashDeposited').textContent = '$' + (data.total_deposited || 0).toFixed(2);
                    document.getElementById('dashReferrals').textContent = data.referrals || 0;
                } else {
                    document.getElementById('loadingMessage').textContent = '❌ Error loading data';
                    document.getElementById('loadingMessage').className = 'error-text';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('loadingMessage').textContent = '❌ Network error: ' + error.message;
                document.getElementById('loadingMessage').className = 'error-text';
            });
    </script>
</body>
</html>
