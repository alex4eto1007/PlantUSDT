<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Dashboard - PlantUSDT</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <h1 style="color: #00ff87; font-size: 20px;">📊 Dashboard</h1>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-label">Balance</div>
                <div class="stat-value" id="dashBalance">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🌱</div>
                <div class="stat-label">Invested</div>
                <div class="stat-value" id="dashInvested">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-label">Earned</div>
                <div class="stat-value" id="dashEarned">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💳</div>
                <div class="stat-label">Deposited</div>
                <div class="stat-value" id="dashDeposited">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-label">Referrals</div>
                <div class="stat-value" id="dashReferrals">0</div>
            </div>
        </div>

        <div class="actions-grid" style="grid-template-columns: repeat(1, 1fr);">
            <button class="action-btn" onclick="navigateTo('history')" style="background: linear-gradient(135deg, #a29bfe, #6c5ce7) !important; color: #ffffff !important; border: none; padding: 16px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%;">
                <span class="btn-icon">📜</span>
                Transaction History
            </button>
        </div>
    </div>

    <script src="js/app.js?v=14"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Telegram WebApp
            if (window.Telegram && window.Telegram.WebApp) {
                window.tg = window.Telegram.WebApp;
                window.tg.ready();
                window.tg.expand();
            }
            // Load user data
            if (typeof loadUserData === 'function') {
                loadUserData();
            } else {
                console.error('loadUserData function not found');
            }
        });
    </script>
</body>
</html>
