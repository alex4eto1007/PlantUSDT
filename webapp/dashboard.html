<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Dashboard - PlantUSDT</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">←</button>
            <h1 style="color: #00ff87; font-size: 20px;">📊 Dashboard</h1>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-label">Balance</div>
                <div class="stat-value" id="dashBalance">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🌱</div>
                <div class="stat-label">Invested</div>
                <div class="stat-value" id="dashInvested">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📈</div>
                <div class="stat-label">Earned</div>
                <div class="stat-value" id="dashEarned">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💳</div>
                <div class="stat-label">Deposited</div>
                <div class="stat-value" id="dashDeposited">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-label">Referrals</div>
                <div class="stat-value" id="dashReferrals">0</div>
            </div>
        </div>

        <!-- Debug Button -->
        <button onclick="document.getElementById('debugInfo').style.display='block'" style="background: rgba(255,0,0,0.1); border: 1px solid #ff6b6b; border-radius: 4px; padding: 4px 8px; color: #ff6b6b; font-size: 10px; cursor: pointer; margin-bottom: 8px; width: 100%;">🐛 Show Debug</button>

        <!-- Debug Info -->
        <div id="debugInfo" style="background: rgba(255,0,0,0.1); border: 1px solid red; border-radius: 8px; padding: 12px; margin: 12px 0; font-size: 12px; color: #ff6b6b; display: none; word-break: break-all;">
            <div id="debugData">Loading...</div>
        </div>

        <div class="actions-grid" style="grid-template-columns: repeat(1, 1fr);">
            <button class="action-btn" onclick="navigateTo('history')" style="background: linear-gradient(135deg, #a29bfe, #6c5ce7) !important; color: #ffffff !important; border: none; padding: 16px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%;">
                <span class="btn-icon">📜</span>
                Transaction History
            </button>
        </div>
    </div>

    <script src="js/app.js?v=16"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Telegram WebApp
            if (window.Telegram && window.Telegram.WebApp) {
                window.tg = window.Telegram.WebApp;
                window.tg.ready();
                window.tg.expand();
            }

            // Get user ID from Telegram
            const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;
            const userId = tgUser?.id || '0';
            
            // Debug element
            const debugEl = document.getElementById('debugData');
            const debugInfo = document.getElementById('debugInfo');

            async function loadDashboardData() {
                try {
                    if (debugEl) debugEl.textContent = '1️⃣ Fetching user ID: ' + userId + '\n';
                    
                    const response = await fetch(`https://plantusdt.ddns.net/api/user?telegram_id=${userId}`);
                    const data = await response.json();
                    
                    if (debugEl) debugEl.textContent += '2️⃣ API Response received\n';
                    if (debugEl) debugEl.textContent += '3️⃣ Data: ' + JSON.stringify(data, null, 2) + '\n';
                    
                    if (data.success) {
                        // Manually update dashboard
                        document.getElementById('dashBalance').textContent = '$' + (data.balance || 0).toFixed(2);
                        document.getElementById('dashInvested').textContent = '$' + (data.total_invested || 0).toFixed(2);
                        document.getElementById('dashEarned').textContent = '$' + (data.total_earnings || 0).toFixed(2);
                        document.getElementById('dashDeposited').textContent = '$' + (data.total_deposited || 0).toFixed(2);
                        document.getElementById('dashReferrals').textContent = data.referrals || 0;
                        
                        if (debugEl) debugEl.textContent += '4️⃣ ✅ Dashboard updated!\n';
                        if (debugEl) debugEl.textContent += '   Balance: $' + (data.balance || 0).toFixed(2) + '\n';
                        if (debugEl) debugEl.textContent += '   Invested: $' + (data.total_invested || 0).toFixed(2) + '\n';
                        if (debugEl) debugEl.textContent += '   Earned: $' + (data.total_earnings || 0).toFixed(2) + '\n';
                        if (debugEl) debugEl.textContent += '   Deposited: $' + (data.total_deposited || 0).toFixed(2) + '\n';
                        if (debugEl) debugEl.textContent += '   Referrals: ' + (data.referrals || 0);
                    } else {
                        if (debugEl) debugEl.textContent += '4️⃣ ❌ API returned success: false\n';
                        if (debugEl) debugEl.textContent += '   Message: ' + (data.message || 'Unknown error');
                    }
                } catch (error) {
                    if (debugEl) debugEl.textContent = '❌ Error: ' + error.message + '\n';
                    if (debugEl) debugEl.textContent += 'Stack: ' + error.stack;
                    console.error('Error loading user data:', error);
                }
            }

            // Also try the global loadUserData if it exists
            if (typeof loadUserData === 'function') {
                if (debugEl) debugEl.textContent = '✅ loadUserData function found, calling it...\n';
                loadUserData();
            } else {
                if (debugEl) debugEl.textContent = '⚠️ loadUserData not found, using fallback...\n';
                loadDashboardData();
            }

            // Auto-show debug after 3 seconds
            setTimeout(function() {
                if (debugInfo) debugInfo.style.display = 'block';
            }, 3000);
        });
    </script>
</body>
</html>
