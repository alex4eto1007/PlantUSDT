<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Dashboard - PlantUSDT</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .stat-value { font-size: 20px; }
        .loading-text { color: #8892b0; font-size: 14px; text-align: center; padding: 20px; }
        .error-text { color: #ff6b6b; font-size: 14px; text-align: center; padding: 20px; }
        .network-badge-mini {
            display: inline-block;
            background: rgba(130, 71, 229, 0.2);
            color: #8247E5;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
            margin-left: 8px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .dashboard-grid .stat-card {
            padding: 14px 8px;
        }
        .dashboard-grid .stat-value {
            font-size: 16px;
        }
        .dashboard-grid .stat-label {
            font-size: 9px;
        }
        .ad-stat-highlight {
            border: 1px solid rgba(0, 212, 255, 0.3) !important;
            background: rgba(0, 212, 255, 0.05) !important;
        }
        .ad-stat-highlight .stat-value {
            color: #00d4ff !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.history.back()">←</button>
            <h1 style="color: #00ff87; font-size: 20px;">📊 Dashboard</h1>
            <span class="network-badge-mini">🟣 Polygon</span>
        </div>

        <div id="loadingMessage" class="loading-text">Loading your data...</div>

        <div id="dashboardStats" style="display: none;">
            <div class="stats-grid dashboard-grid">
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-label">Balance</div>
                    <div class="stat-value" id="dashBalance">$0.000</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🌱</div>
                    <div class="stat-label">Invested</div>
                    <div class="stat-value" id="dashInvested">$0.000</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-label">Earned</div>
                    <div class="stat-value" id="dashEarned">$0.000</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💳</div>
                    <div class="stat-label">Deposited</div>
                    <div class="stat-value" id="dashDeposited">$0.000</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-label">Referrals</div>
                    <div class="stat-value" id="dashReferrals">0</div>
                </div>
                <div class="stat-card ad-stat-highlight">
                    <div class="stat-icon">📺</div>
                    <div class="stat-label">From Ads</div>
                    <div class="stat-value" id="dashAdEarnings">$0.000</div>
                </div>
            </div>

            <div style="text-align: center; color: rgba(255,255,255,0.4); font-size: 12px; margin: 8px 0 16px 0;">
                ⛓️ All values in USDT on Polygon network
            </div>

            <div class="actions-grid" style="grid-template-columns: repeat(1, 1fr);">
                <button class="action-btn" onclick="window.location.href='history.html'" style="background: linear-gradient(135deg, #a29bfe, #6c5ce7) !important; color: #ffffff !important; border: none; padding: 16px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%;">
                    <span class="btn-icon">📜</span>
                    Transaction History
                </button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        const userId = user?.id || '0';

        console.log('Dashboard loaded, userId:', userId);

        document.getElementById('loadingMessage').textContent = '📡 Fetching data for user: ' + userId;

        fetch(`https://plantusdt.ddns.net/api/user?telegram_id=${userId}`)
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('API Response:', data);

                document.getElementById('loadingMessage').style.display = 'none';
                document.getElementById('dashboardStats').style.display = 'block';

                if (data.success) {
                    document.getElementById('dashBalance').textContent = '$' + (data.balance || 0).toFixed(3);
                    document.getElementById('dashInvested').textContent = '$' + (data.total_invested || 0).toFixed(3);
                    document.getElementById('dashEarned').textContent = '$' + (data.total_earnings || 0).toFixed(3);
                    document.getElementById('dashDeposited').textContent = '$' + (data.total_deposited || 0).toFixed(3);
                    document.getElementById('dashReferrals').textContent = data.referrals || 0;
                    document.getElementById('dashAdEarnings').textContent = '$' + (data.total_ad_earnings || 0).toFixed(3);
                } else {
                    document.getElementById('loadingMessage').textContent = '❌ Error loading data';
                    document.getElementById('loadingMessage').className = 'error-text';
                }
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('loadingMessage').textContent = '❌ Network error: ' + error.message;
                document.getElementById('loadingMessage').className = 'error-text';
            });
    </script>
</body>
</html>
